# 구성 A(단일 EC2): API + PostgreSQL + Caddy(TLS).
# 사용:
#   cp .env.prod.example .env      # 값 채우기
#   (대시보드 빌드) cd ../../dashboard && npm ci && npm run build
#   docker compose -f docker-compose.prod.yml up -d --build
# 사전: 공인 도메인이 이 호스트로 A레코드 연결 + 보안그룹 80/443 오픈 (Caddy Let's Encrypt).
name: findmypad

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..            # 레포 루트 (server/ 포함)
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      CORP_PUBLIC_IPS: ${CORP_PUBLIC_IPS:-}
      CORP_SSIDS: ${CORP_SSIDS:-}
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
      STALE_DAYS: ${STALE_DAYS:-7}
      PORT: "3000"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      # FCM 서비스계정: 아래 volumes로 마운트한 파일 경로(또는 JSON 내용 자체)
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      MAXMIND_MMDB_PATH: ${MAXMIND_MMDB_PATH:-}
    volumes:
      - ../secrets:/run/secrets:ro   # firebase-service-account.json 등 (커밋 금지)
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [api]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../dashboard/dist:/srv/dashboard:ro   # 대시보드 정적 빌드
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:

# NCP 구성: 로컬 박스(공인 IP)에서 API + PostgreSQL + Caddy(TLS)를 돌리는 "원본(origin)".
# 대시보드는 NCP Object Storage + CDN+ 에 별도 호스팅(다른 오리진) → API는 CORS 허용 필요.
#
# 사용:
#   cp .env.example .env      # 값 채우기 (특히 API_DOMAIN, CORS_ORIGINS, DB비번, JWT)
#   mkdir -p ../secrets && cp <firebase 서비스계정>.json ../secrets/firebase-service-account.json
#   docker compose up -d --build
# 사전: api.<도메인> A레코드 → 이 박스 공인 IP, 방화벽 80/443 인바운드 개방(Let's Encrypt).
name: findmypad-ncp

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..            # 레포 루트
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TRUST_PROXY: "true"                    # Caddy/프록시 뒤 → X-Forwarded-For로 실 IP(사내/외부망 판정)
      BASE_PATH: ${BASE_PATH:-}              # 하위경로 배포 시 예: /FindMyPad (API가 /FindMyPad/api 로 서빙)
      CORS_ORIGINS: ${CORS_ORIGINS:-}        # 대시보드가 '다른 오리진'일 때만. 같은 호스트(/FindMyPad)면 비움
      CORP_PUBLIC_IPS: ${CORP_PUBLIC_IPS:-}
      CORP_SSIDS: ${CORP_SSIDS:-}
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
      STALE_DAYS: ${STALE_DAYS:-7}
      PORT: "3000"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      MAXMIND_MMDB_PATH: ${MAXMIND_MMDB_PATH:-}
    volumes:
      - ../secrets:/run/secrets:ro
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [api]
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:

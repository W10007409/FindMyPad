# NCP 구성(경로별 원본): wjtools 하나만 사용 + 프록시/서브도메인 불가.
# NCP CDN+ 가 /FindMyPad/api/* 를 "이 로컬 박스 공인 IP"에서 당기도록(경로별 원본) 설정한다.
# → 로컬은 API를 공인 IP:포트로 노출하기만 하면 된다(도메인/TLS 불필요; CDN이 클라이언트 TLS 종단).
#
# 사용:
#   cp .env.example .env      # BASE_PATH=/FindMyPad, ORIGIN_PORT, DB비번, JWT
#   mkdir -p ../secrets && cp <firebase 서비스계정>.json ../secrets/firebase-service-account.json
#   docker compose up -d --build
# ⚠️ ORIGIN_PORT 를 공인에 여는 만큼, 방화벽에서 source 를 'NCP CDN egress IP 대역'으로 제한 권장.
name: findmypad-ncp

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TRUST_PROXY: "true"                    # CDN 뒤 → X-Forwarded-For로 실 IP(사내/외부망 판정)
      BASE_PATH: ${BASE_PATH:-/FindMyPad}    # CDN이 경로 그대로 전달 → API는 /FindMyPad/api 로 수신
      CORS_ORIGINS: ${CORS_ORIGINS:-}        # 같은 호스트(wjtools) → 비움
      CORP_PUBLIC_IPS: ${CORP_PUBLIC_IPS:-}
      CORP_SSIDS: ${CORP_SSIDS:-}
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
      STALE_DAYS: ${STALE_DAYS:-7}
      PORT: "3000"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      MAXMIND_MMDB_PATH: ${MAXMIND_MMDB_PATH:-}
    volumes:
      - ../secrets:/run/secrets:ro
    # CDN이 당길 공인 원본 포트. (예: 8080 → CDN origin = http://<공인IP>:8080)
    ports:
      - "${ORIGIN_PORT:-8080}:3000"

volumes:
  pgdata:

# frps — NCP 릴레이 서버(공인 IP)에서 실행. 터널 종단.
bindPort = 7000                       # frpc(내부 서버)가 붙는 포트
auth.method = "token"
auth.token = "CHANGE_ME_strong_shared_tunnel_token"   # frpc와 동일해야 함

# (선택) 관리 대시보드 — 로컬에서만
webServer.addr = "127.0.0.1"
webServer.port = 7500
webServer.user = "admin"
webServer.password = "CHANGE_ME"

# 참고: frpc가 remotePort=8080 을 등록하면 frps가 이 호스트의 8080 에서 리슨하여
# 내부 API로 포워딩한다. 방화벽에서 8080 은 NCP CDN egress IP 만 허용.

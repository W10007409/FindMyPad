# 내부 서버(공인 IP 불필요, 아웃바운드만)에서 실행: API + Postgres + frpc.
# API 포트를 호스트에 publish하지 않는다 → 인터넷 노출 0. frpc가 릴레이로 아웃바운드 연결.
#   cp .env.example .env  (BASE_PATH=/FindMyPad, DB/JWT)  +  frpc.toml 편집(RELAY_PUBLIC_IP/token)
#   docker compose -f docker-compose.internal.yml up -d --build
name: findmypad-internal

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../..            # 레포 루트
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TRUST_PROXY: "true"                  # CDN의 X-Forwarded-For로 실 IP(사내/외부망 판정)
      BASE_PATH: ${BASE_PATH:-/FindMyPad}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      CORP_PUBLIC_IPS: ${CORP_PUBLIC_IPS:-}
      CORP_SSIDS: ${CORP_SSIDS:-}
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
      STALE_DAYS: ${STALE_DAYS:-7}
      PORT: "3000"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      MAXMIND_MMDB_PATH: ${MAXMIND_MMDB_PATH:-}
    volumes:
      - ../secrets:/run/secrets:ro
    # ports 없음 — 인터넷 노출 0. frpc 만 접근.
    expose:
      - "3000"

  frpc:
    image: snowdreamtech/frpc:0.61.0
    restart: unless-stopped
    depends_on: [api]
    volumes:
      - ./frpc.toml:/etc/frp/frpc.toml:ro
    # 아웃바운드로 릴레이(RELAY_PUBLIC_IP:7000)에 연결 → remotePort 8080 을 api:3000 으로 포워딩

volumes:
  pgdata:

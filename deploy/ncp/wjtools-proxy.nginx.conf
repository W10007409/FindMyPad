# 구성 B: wjtools.wjthinkbig.com 프론트 계층(리버스프록시)에 추가할 /FindMyPad 라우팅.
# NCP CDN+(버킷 정적)만으로는 동적 API를 통과시킬 수 없으므로, 이 프록시가 경로를 분기한다.
# 이 server 블록(또는 기존 wjtools server의 location들)에 반영.

# 로컬 API 원본 (Caddy TLS). deploy/ncp/.env 의 API_DOMAIN.
upstream findmypad_api { server findmypad-origin.wjthinkbig.com:443; }

server {
    listen 443 ssl http2;
    server_name wjtools.wjthinkbig.com;
    # ssl_certificate ... ;   # 기존 wjtools 인증서 사용

    # 동적 API → 로컬 원본 (경로 그대로; 서버가 BASE_PATH=/FindMyPad 로 수신)
    location /FindMyPad/api/ {
        proxy_pass         https://findmypad_api;
        proxy_ssl_server_name on;
        proxy_set_header   Host              findmypad-origin.wjthinkbig.com;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;  # 사내/외부망 판정
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    # 정적 프론트 → NCP Object Storage 버킷(ai-srt-corrector/FindMyPad/), SPA 폴백
    location /FindMyPad/ {
        proxy_pass            https://kr.object.ncloudstorage.com/ai-srt-corrector/FindMyPad/;
        proxy_set_header      Host kr.object.ncloudstorage.com;
        proxy_intercept_errors on;
        error_page 403 404 = @findmypad_spa;
    }
    location @findmypad_spa {
        proxy_pass       https://kr.object.ncloudstorage.com/ai-srt-corrector/FindMyPad/index.html;
        proxy_set_header Host kr.object.ncloudstorage.com;
    }

    # ... wjtools의 다른 도구 경로(ai-srt-corrector 등)는 기존 설정 유지 ...
}

# 참고(Caddy로 동일하게):
#   handle /FindMyPad/api/* { reverse_proxy https://findmypad-origin.wjthinkbig.com { header_up Host {upstream_hostport} } }
#   handle /FindMyPad/*     { reverse_proxy https://kr.object.ncloudstorage.com { header_up Host kr.object.ncloudstorage.com; rewrite * /ai-srt-corrector{path} }
#                             handle_errors { rewrite * /ai-srt-corrector/FindMyPad/index.html; reverse_proxy https://kr.object.ncloudstorage.com { header_up Host kr.object.ncloudstorage.com } } }
